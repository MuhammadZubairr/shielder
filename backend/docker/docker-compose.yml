version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: shielder-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shielder}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shielder_password}
      POSTGRES_DB: ${POSTGRES_DB:-shielder_db}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - shielder-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U shielder']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (Optional - for future caching)
  redis:
    image: redis:7-alpine
    container_name: shielder-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - shielder-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: shielder-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      DATABASE_URL: postgresql://${POSTGRES_USER:-shielder}:${POSTGRES_PASSWORD:-shielder_password}@postgres:5432/${POSTGRES_DB:-shielder_db}?schema=public
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your-super-secret-refresh-token-key}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - shielder-network
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres_data:
  redis_data:

networks:
  shielder-network:
    driver: bridge
